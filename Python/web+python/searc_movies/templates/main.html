<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviez</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body{
            background: linear-gradient(to top, #682020, #c92f2f);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .title{
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.87);
            text-align: center;
            border: 1px solid black;
            border-radius: 10px;
            font-size: 28px;
            letter-spacing: 2px;
            line-height: 20px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-top: 40px;
            padding: 10px 50px 10px 50px;
        }
        .search{
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.87);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            border:25px;
            overflow: hidden;
            margin-top: 20px;
            border:1px solid black;
            border-radius: 10px;
        }

        input{
            padding-left: 40px;
            height: 40px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/622/622669.png');
            background-repeat: no-repeat;
            background-position: 10px center;
            background-size: 20px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            outline:none;
            background-color: rgba(255,255,255,0.2);  /* fundal semi-transparent */
            color: white;
            width: 300px;

        }
        button {
        padding: 10px 15px;
        border-radius: 25px;
        border: none;
        background-color: black;
        color: white;
        font-size: 15px;
        cursor: pointer;

        /* Optiuni extra */
        font-weight: bold;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.87)
        }
        .resultate{
            display: flex;
            flex-wrap: wrap;
            gap:20px;
            padding: 20px;
            justify-content: center;
            min-height: auto;
        }
        .card{
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.87);
            width: 250px;
            min-height: 200px;
            padding: 20px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid black;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .card:hover{
            transform: translateY(-5px);
            box-shadow:0 10px 30px rgba(0,0,0,0.4); ;
        }
        .card img {
            width: 100%;          /* ocupa toata latimea cardului */
            min-height: 100px;
            object-fit: cover;    /* imaginea sa nu se deformeze */
        }
        .card-info{
            font-size: 20px;
        }
        .badge{
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            color:white;
            background-color: green;
            z-index: 1;
        }
        .details-btn{
            margin-top: px;
            font-size: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.87)
        }
    </style>
</head>
<body>
    <div class="title">
        <h1>Ce film cauți</h1>
    </div>

    <div class="search">
        <form action="" method="GET">
            <input type="text" id="cautare" name="cautare" placeholder="Cauta un film... "/>
            <button type="submit" value="submit">submit</button>
        </form>
        <div class="resultate">
           <div class="card">
                <img src="movie.jpg" alt="Film"/>
                <div class="badge">8.5</div>
                <div class="card-info">
                    <h2>Titlul filmului</h2>
                    <p>An: 2024</p>
                    <button class="details-btn">Mai multe detalii...</button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
