<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carduri</title>
    <style>
        .title{
            margin: auto;
            border-radius: 8px;
            text-align: center;
            border: 1px solid black;
            padding: auto;
            width: 50%;
        }
        .title p{
            font-size: 20px;
        }
        .continut{
            text-align: center;
            font-size: 0;
        }

       .card{
        position: relative;
        display: inline-block;
        width: 350px;
        height: 500px;
        padding: 15px;
        top: 20px;
        margin: 20px;
        border: 1px solid black;
        border-radius: 10px;
        text-align: center;
        box-sizing: border-box;
        font-size: 40px;
        }
        .card img{
        width: 100%;
        height: 180px;
        border-radius: 10px;
        }
        .new{
            background-color: lightyellow;
        }
        .reducere{
            background-color: rgb(171, 238, 171);
        }
        .promotion{
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="title">
        <h1>Carduri</h1>
        <p>Colecție de Carduri Tematice</p>
    </div>
    <div class="continut">
    <div class="card new ">
        <p>Iphone 20</p>
        <img src="iphone.jpg"/>
    </div>
    <div class="card reducere ">
        <p>Samsung S20</p>
    </div>
    <div class="card promotion">
        <p>Husa+Bowerbank</p>
    </div>
    </div>

    <div class=""></div>
</body>
</html>
