    <title>Pozitionare</title>
    <style>
        .box-static{
            position: static;
            height: 200px;
            background-color: blue;
            color: white;
            padding: 20px;
        }
        .box-relativ{
            position: relative;
            height:200px;
            background-color:red;
            color: white;
            padding: 20px;
            top:20px;
            left: 25px;
        }
        .box-relativ1,
        .box-relativ2,
        .box-relativ3
        {
            width: 200px;
            padding: 20px;
            margin: 10px;
    
        }
        .box-relativ1{
            background-color: lightblue;
        }
        .box-relativ2{
            position: relative;
            top: 50px;
            left: 20px;
            background-color: lightgreen;
        }
        .box-relativ3{
            background-color: lightcoral;


        }
        .box-absolut{
            position: absolute;
            top: 25px;
            left: 50px;
            width: 250px;
            padding: 20px;
            background-color: orange;


        }
        .card{
            position:relative;
            width: 300px;
            height: 200px;
            padding: 30px;
            background-color:coral ;
            border: 1px solid grey;
            
        }
        .badge{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color:limegreen;
            padding: 5px 10px;
            color: white;
        }
        .input-box{
            position: relative;
            width: 360px;

        }
        .input-box input{
            width: 100%;
            padding: 12px 12px 12px 40px;
            box-sizing: border-box;



        }
        .icon{
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .Whatsapp{
            position: fixed;
            right: 20px;
            bottom: 20px;
            background-color: green;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 30px;

        }

        .header{
            position: fixed;
            left: 0px;
            top: 0px;
            width: 100%;
            padding: 15px;
            background-color: #222;
            color: white;
        }

        .card{
            margin-top: 100px;
        }
        .menu{
            position: sticky;
            top: 20px;
            background-color: #222;
            color: white;
            padding: 15px;

        }
        .box{
            position:absolute;
            width: 150px;
            height: 150px;
        }
        .blue{
            background-color: blue;
            top: 50px;
            left: 50px;
            z-index: 2;
        }
        .red{
            background-color:red;
            top:100px;
            left: 100px;
            z-index: 1;

        }
        .card1{
            position:relative;
            width: 300px;
            height: 200px;
            padding: 20px;
            background-color:lightblue ;
            border: 1px solid darkblue;


        }
        .badge1{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color:darkblue;
            padding: 5px 10px;
            color: white;
        }
    </style>
</head>
